<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}KSP Planner{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@400;500;600&family=JetBrains+Mono:wght@400;500&family=Source+Serif+4:opsz,wght@8..60,400;8..60,500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/css/theme.css">
  <link rel="stylesheet" href="/static/css/components.css">
  <script src="/static/js/htmx.min.js" defer></script>
</head>
<body>
  <div class="home--wb">
    <header class="wb-top">
      <div class="wb-brand">
        <div class="wb-mark"><span></span><span></span><span></span><span></span></div>
        <div>
          <div class="wb-brand-name">KSP Planner</div>
          <div class="wb-brand-sub">engineer's workbench</div>
        </div>
      </div>
      <nav class="wb-tools">
        <a href="/dv" class="wb-chip {{ 'is-active' if active_nav == 'dv' else '' }}">Δv Trip</a>
        <span class="wb-chip is-disabled" title="ships in 8b">Comm Net</span>
        <span class="wb-chip is-disabled" title="ships in 8d">Δv Budget</span>
        <span class="wb-chip is-disabled" title="ships in 8d">Hohmann</span>
        <span class="wb-chip is-disabled" title="ships in 8d">TWR</span>
        <span class="wb-chip is-disabled" title="ships in 8c">Plans</span>
      </nav>
      <div class="wb-meta">
        <span class="wb-meta-key">scope</span>
        <span class="wb-meta-val">stock KSP1 · 17 bodies · 9 antennas · 3 DSN</span>
      </div>
    </header>
    <main class="wb-canvas">
      {% block content %}{% endblock %}
    </main>
  </div>
</body>
</html>
